<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>זמינות אולמות חתונה</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Assistant',sans-serif;background:#f7f5f0;color:#1a1a1a;min-height:100vh;display:flex;flex-direction:column;}

/* AD BANNER SPACE TOP */
.ad-top{width:100%;height:60px;background:#e8e4dc;display:flex;align-items:center;justify-content:center;font-size:0.75rem;color:#999;border-bottom:1px solid #d5d0c8;flex-shrink:0;}

header{background:#1a1a2e;color:white;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
header h1{font-size:1.1rem;font-weight:700;}
#logoImg{height:40px;display:none;border-radius:4px;}
.legend{display:flex;gap:10px;font-size:0.75rem;}
.legend-item{display:flex;align-items:center;gap:4px;}
.dot{width:9px;height:9px;border-radius:50%;}
.dot-green{background:#2ecc71;}.dot-red{background:#e74c3c;}.dot-orange{background:#f39c12;}
.header-left{display:flex;gap:8px;}
.btn-halls{padding:6px 12px;background:#e8b86d;color:#1a1a2e;border:none;border-radius:6px;cursor:pointer;font-family:'Assistant',sans-serif;font-weight:700;font-size:0.8rem;text-decoration:none;display:inline-flex;align-items:center;}

/* Main layout */
.main-layout{display:flex;flex:1;overflow:hidden;height:calc(100vh - 120px);}

/* Sidebar */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:99;}
.sidebar-overlay.open{display:block;}
.sidebar{width:210px;min-width:190px;width:210px;min-width:190px;background:white;border-left:1px solid #e0ddd6;padding:12px 10px;overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column;height:100%;position:sticky;top:0;}
.sidebar-title{font-size:0.82rem;font-weight:700;color:#1a1a2e;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #1a1a2e;}
.filter-group{margin-bottom:11px;}
.filter-label{font-size:0.72rem;color:#666;font-weight:600;margin-bottom:4px;display:block;}
.filter-input{width:100%;padding:6px 7px;border:1px solid #ddd;border-radius:6px;font-family:'Assistant',sans-serif;font-size:0.8rem;background:#fafafa;}

.dropdown-check{position:relative;width:100%;}
.dropdown-btn{width:100%;padding:6px 8px;border:1px solid #ddd;border-radius:6px;background:#fafafa;cursor:pointer;font-family:'Assistant',sans-serif;font-size:0.8rem;text-align:right;display:flex;justify-content:space-between;align-items:center;color:#333;}
.dropdown-btn:after{content:'▼';font-size:0.5rem;color:#999;}
.dropdown-btn.open:after{content:'▲';}
.dropdown-list{display:none;position:absolute;top:100%;right:0;left:0;z-index:999;background:white;border:1px solid #ddd;border-radius:6px;box-shadow:0 4px 16px rgba(0,0,0,0.12);max-height:160px;overflow-y:auto;margin-top:2px;}
.dropdown-list.open{display:block;}
.dropdown-item{display:flex;align-items:center;gap:6px;padding:7px 9px;cursor:pointer;font-size:0.8rem;border-bottom:1px solid #f5f5f5;}
.dropdown-item:last-child{border-bottom:none;}
.dropdown-item:hover{background:#f7f5f0;}
.dropdown-item input[type=checkbox]{width:13px;height:13px;cursor:pointer;accent-color:#1a1a2e;}
.dropdown-item label{cursor:pointer;flex:1;}

.range-row{display:flex;gap:4px;align-items:center;}
.range-row input{width:48%;padding:5px 5px;border:1px solid #ddd;border-radius:5px;font-family:'Assistant',sans-serif;font-size:0.76rem;}
.range-row span{font-size:0.7rem;color:#999;}

.btn-filter{width:100%;padding:8px;background:#1a1a2e;color:white;border:none;border-radius:6px;cursor:pointer;font-family:'Assistant',sans-serif;font-weight:600;font-size:0.85rem;margin-top:4px;}
.btn-reset{width:100%;padding:6px;background:#eee;color:#444;border:none;border-radius:6px;cursor:pointer;font-family:'Assistant',sans-serif;font-size:0.78rem;margin-top:5px;}

/* Contact banner */
.contact-banner{margin-top:auto;padding-top:12px;border-top:1px solid #eee;}
.contact-title{font-size:0.72rem;font-weight:700;color:#555;margin-bottom:6px;}
.contact-email{display:block;font-size:0.75rem;color:#1a1a2e;text-decoration:none;margin-bottom:6px;}
.contact-email:hover{text-decoration:underline;}
.btn-admin{width:100%;padding:6px;background:#f0f0f0;color:#555;border:1px solid #ddd;border-radius:5px;cursor:pointer;font-family:'Assistant',sans-serif;font-size:0.72rem;}
.btn-admin:hover{background:#e8e8e8;}

/* AD SIDEBAR */
.ad-sidebar{width:130px;background:#e8e4dc;display:flex;align-items:center;justify-content:center;font-size:0.7rem;color:#999;flex-shrink:0;border-right:1px solid #d5d0c8;position:sticky;top:0;align-self:flex-start;max-height:100vh;}

/* Table area */
.table-area{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:8px;height:100%;}

.view-toggle{display:none;gap:8px;margin-bottom:8px;align-items:center;flex-shrink:0;}
.view-btn{padding:5px 12px;border:1px solid #ddd;border-radius:5px;background:white;cursor:pointer;font-family:'Assistant',sans-serif;font-size:0.76rem;color:#555;}
.view-btn.active{background:#1a1a2e;color:white;border-color:#1a1a2e;}
.view-note{font-size:0.72rem;color:#999;}

.table-scroll{overflow:auto;flex:1;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,0.07);}
table{border-collapse:collapse;background:white;font-size:0.68rem;width:max-content;min-width:100%;}
thead{position:sticky;top:0;z-index:10;}
thead tr{background:#1a1a2e;color:white;}
th{padding:8px 5px;text-align:center;font-weight:600;font-size:0.65rem;white-space:nowrap;}
th.date-col{text-align:right;min-width:100px;position:sticky;right:0;background:#1a1a2e;z-index:11;}
td{padding:0;text-align:center;border-bottom:1px solid #f0ece4;height:32px;}
td.date-cell{text-align:right;font-weight:600;color:#333;white-space:nowrap;background:#fafaf7;position:sticky;right:0;border-left:2px solid #e8e4dc;padding:3px 5px;z-index:5;}
.date-greg{font-size:0.6rem;color:#bbb;display:block;font-weight:400;}
.cell-status{display:block;width:100%;height:32px;line-height:32px;font-size:0.65rem;font-weight:700;text-align:center;}
.cell-free{background:#d4f5e4;color:#1a7a45;}
.cell-taken{background:#fde8e8;color:#a32020;}
.cell-reserved{background:#fef3cd;color:#8a5c00;}

/* Calendar */
.calendar-view{display:none;overflow-y:auto;flex:1;}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.cal-nav{padding:5px 12px;background:#1a1a2e;color:white;border:none;border-radius:5px;cursor:pointer;font-family:'Assistant',sans-serif;font-size:0.8rem;}
.cal-title{font-size:0.9rem;font-weight:700;color:#1a1a2e;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-day-header{text-align:center;font-size:0.68rem;color:#999;font-weight:600;padding:3px;}
.cal-cell{min-height:52px;border-radius:5px;padding:3px;font-size:0.65rem;border:1px solid #eee;background:white;}
.cal-cell.empty{background:transparent;border:none;}
.cal-date-he{font-size:0.6rem;color:#555;font-weight:600;}
.cal-date-greg{font-size:0.58rem;color:#aaa;display:block;margin-bottom:2px;}
.cal-status{font-size:0.58rem;font-weight:700;padding:1px 3px;border-radius:3px;margin-top:2px;display:inline-block;}

.loading{text-align:center;padding:50px;color:#888;font-size:0.9rem;}
.error{text-align:center;padding:30px;color:#e74c3c;font-size:0.85rem;}

/* AD BOTTOM */
.ad-bottom{position:fixed;bottom:0;right:0;left:0;height:2.5cm;background:#1a1a2e;display:flex;align-items:center;justify-content:center;font-size:0.85rem;color:#e8b86d;font-weight:600;border-top:2px solid #e8b86d;z-index:500;}
.ad-bottom a{color:#e8b86d;text-decoration:none;}
.ad-bottom-spacer{height:2.5cm;flex-shrink:0;}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:white;border-radius:10px;padding:24px;width:320px;max-width:90vw;}
.modal h2{font-size:1rem;margin-bottom:16px;color:#1a1a2e;}
.modal input{width:100%;padding:9px;border:1px solid #ddd;border-radius:6px;font-family:'Assistant',sans-serif;font-size:0.9rem;margin-bottom:10px;}
.modal .modal-btns{display:flex;gap:8px;}
.modal .btn-ok{flex:1;padding:9px;background:#1a1a2e;color:white;border:none;border-radius:6px;cursor:pointer;font-family:'Assistant',sans-serif;font-weight:600;}
.modal .btn-cancel{padding:9px 14px;background:#eee;color:#444;border:none;border-radius:6px;cursor:pointer;font-family:'Assistant',sans-serif;}
.modal .error-msg{color:#e74c3c;font-size:0.78rem;margin-bottom:8px;display:none;}

@media(max-width:700px){
  .main-layout{flex-direction:column;}
  .sidebar{width:100%;border-left:none;border-bottom:1px solid #e0ddd6;}
  .ad-sidebar{display:none;}
  .legend{display:none;}
}
</style>
</head>
<body>

<!-- TOP AD -->
<div class="ad-top">פרסומת | 728×60</div>

<header>
  <div class="header-right">
    <button class="hamburger-btn" onclick="toggleSidebar()">☰</button>
    <h1>זמינות אולמות חתונה</h1>
    <div class="legend">
      <div class="legend-item"><div class="dot dot-green"></div> פנוי</div>
      <div class="legend-item"><div class="dot dot-red"></div> תפוס</div>
      <div class="legend-item"><div class="dot dot-orange"></div> שמור</div>
    </div>
  </div>
  <div class="header-left">
    <a href="halls.html" class="btn-halls">🏛 מידע על אולמות</a>
  </div>
</header>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<div id="adTop" style="display:none;width:100%;height:60px;background:#e8e4dc;align-items:center;justify-content:center;font-size:0.75rem;color:#999;border-bottom:1px solid #d5d0c8;flex-shrink:0;"></div>

<div class="main-layout">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-title">🔍 סינון</div>

    <div class="filter-group">
      <span class="filter-label">מתאריך</span>
      <input type="date" id="filterFrom" class="filter-input"/>
    </div>
    <div class="filter-group">
      <span class="filter-label">עד תאריך</span>
      <input type="date" id="filterTo" class="filter-input"/>
    </div>
    <div class="filter-group">
      <span class="filter-label" style="font-size:0.65rem;color:#999">או חפש חודש עברי</span>
      <select id="filterHeMonth" class="filter-input" onchange="applyHebrewMonthFilter()" style="font-size:0.75rem;">
        <option value="">-- בחר חודש עברי --</option>
        <option value="תשרי">תשרי</option><option value="חשון">חשון</option>
        <option value="כסלו">כסלו</option><option value="טבת">טבת</option>
        <option value="שבט">שבט</option><option value="אדר">אדר</option>
        <option value="אדר ב">אדר ב</option><option value="ניסן">ניסן</option>
        <option value="אייר">אייר</option><option value="סיון">סיון</option>
        <option value="תמוז">תמוז</option><option value="אב">אב</option>
        <option value="אלול">אלול</option>
      </select>
    </div>

    <div class="filter-group">
      <span class="filter-label">עיר</span>
      <div class="dropdown-check">
        <button class="dropdown-btn" id="btnCity" onclick="toggleDD('listCity','btnCity')"><span id="lblCity">הכל</span></button>
        <div class="dropdown-list" id="listCity"></div>
      </div>
    </div>

    <div class="filter-group">
      <span class="filter-label">כשרות</span>
      <div class="dropdown-check">
        <button class="dropdown-btn" id="btnKashrut" onclick="toggleDD('listKashrut','btnKashrut')"><span id="lblKashrut">הכל</span></button>
        <div class="dropdown-list" id="listKashrut"></div>
      </div>
    </div>

    <div class="filter-group">
      <span class="filter-label">אולם</span>
      <div class="dropdown-check">
        <button class="dropdown-btn" id="btnHall" onclick="toggleDD('listHall','btnHall')"><span id="lblHall">הכל</span></button>
        <div class="dropdown-list" id="listHall"></div>

    <div class="filter-group">

    <div class="filter-group">

    <div class="contact-banner">
      <a href="mailto:admin@example.com" id="contactMailLink" style="display:block;text-align:center;padding:9px;background:#1a1a2e;color:white;border-radius:6px;text-decoration:none;font-weight:600;font-size:0.82rem;margin-bottom:8px;">📬 יצירת קשר והערות</a>

  <!-- TABLE -->
  <div class="table-area">

    <div class="calendar-view" id="calendarView">
      <div class="cal-header">
        <button class="cal-nav" onclick="calPrev()">◄</button>

</div>

<!-- BOTTOM AD -->
<div class="ad-bottom">פרסומת | 728×50</div>

<!-- Admin Modal -->
<div class="modal-overlay" id="adminModal">
  <div class="modal">
    <h2>🔐 כניסה לניהול</h2>
    <div class="error-msg" id="loginError">סיסמה שגויה</div>
    <input type="password" id="adminPass" placeholder="הכנס סיסמה..." onkeydown="if(event.key==='Enter')checkPass()"/>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeAdmin()">ביטול</button>
      <button class="btn-ok" onclick="checkPass()">כניסה</button>
    </div>

<script>
const API_URL='https://script.google.com/macros/s/AKfycbziYMBlMR3C_QbmPmDESOkYBWPSGwJ4f2sja-Os4BKj7Xm5KLgdNkhEmY4w3_5Lq_RtnA/exec';
const DAYS_HE=['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
const DAYS_S=['א','ב','ג','ד','ה','ו','ש'];
const MONTHS_GREG=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];

let allData=[], currentView='table', calYear, calMonth, calHall='';
let ADMIN_PASS=localStorage.getItem('adminPass')||'CHANGE_ME';

// Hebrew letters
const HD=['','א','ב','ג','ד','ה','ו','ז','ח','ט','י','יא','יב','יג','יד','טו','טז','יז','יח','יט','כ','כא','כב','כג','כד','כה','כו','כז','כח','כט','ל'];
const HH=['','ק','ר','ש','ת'],HT=['','י','כ','ל','מ','נ','ס','ע','פ','צ'],HO=['','א','ב','ג','ד','ה','ו','ז','ח','ט'];
function yearHe(y){const n=y%1000,h=Math.floor(n/100),t=Math.floor((n%100)/10),o=n%10;let r=(HH[h]||'')+(HT[t]||'')+(HO[o]||'');return r.length>1?r.slice(0,-1)+'"'+r.slice(-1):r+"'";}
function toHe(d){try{const r=d.toLocaleDateString('he-IL-u-ca-hebrew',{year:'numeric',month:'long',day:'numeric'});const m=r.match(/(\d+)\s+ב?(\S+)\s+(\d+)/);return m?(HD[+m[1]]||m[1])+"' "+m[2]+' '+yearHe(+m[3]):r;}catch(e){return '';}}
function fmtKey(d){return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();}

function parseAPI(rows){
  const result=[];
  rows.forEach(r=>{
    // Find keys case-insensitive
    const keys=Object.keys(r);
    const fk=n=>keys.find(k=>k.toLowerCase().includes(n))||null;
    const dateKey=fk('date'), hallKey=fk('hallname')||fk('hall');
    const statusKey=fk('status');
    const cityKey=fk('city')||fk('location')||fk('עיר')||fk('אזור');
    const kashKey=fk('kashrut')||fk('kosher')||fk('כשרות')||fk('כשר');
    const seatsKey=fk('מקומות')||fk('seats')||fk('קיבולת')||fk('capacity');
    const accessKey=fk('נגישות')||fk('access')||fk('נגיש');
    if(!dateKey||!hallKey) return;
    let raw=r[dateKey]+'', pd=null;
    if(raw.includes('/'))pd=new Date(+raw.split('/')[2],+raw.split('/')[1]-1,+raw.split('/')[0]);
    else if(raw.includes('-'))pd=new Date(raw);
    else return;
    if(!pd||isNaN(pd)) return;
    result.push({
      dateObj:pd, dateKey:fmtKey(pd),
      hall:r[hallKey]||'',
      status:r[statusKey]||'פנוי',
      city:cityKey?r[cityKey]:'',
      kashrut:kashKey?r[kashKey]:'',
      seats:seatsKey?parseInt(r[seatsKey])||0:0,
      access:accessKey?r[accessKey]:''
    });
  });
  return result;
}

function buildCL(listId,lblId,items){
  const all=`<div class="dropdown-item"><input type="checkbox" id="${listId}_all" value="__all__" onchange="toggleAll('${listId}','${lblId}',this)"><label for="${listId}_all"><strong>הכל</strong></label></div>`;
  const opts=items.map((v,i)=>`<div class="dropdown-item"><input type="checkbox" id="${listId}_${i}" value="${v}" onchange="updateLbl('${listId}','${lblId}')"><label for="${listId}_${i}">${v}</label></div>`).join('');
  document.getElementById(listId).innerHTML=all+opts;
}

function toggleAll(listId,lblId,el){
  document.querySelectorAll(`#${listId} input:not([value="__all__"])`).forEach(c=>c.checked=el.checked);
  updateLbl(listId,lblId);
}

function updateLbl(listId,lblId){
  const allCb=document.querySelector(`#${listId} input[value="__all__"]`);
  const items=[...document.querySelectorAll(`#${listId} input:not([value="__all__"]):checked`)].map(c=>c.value);
  const total=document.querySelectorAll(`#${listId} input:not([value="__all__"])`).length;
  if(allCb) allCb.checked=items.length===total;
  document.getElementById(lblId).textContent=items.length===0||items.length===total?'הכל':items.join(', ');
  // Calendar toggle
  const hallItems=[...document.querySelectorAll('#listHall input:not([value="__all__"]):checked')].map(c=>c.value);
  const vt=document.getElementById('viewToggle');
  if(hallItems.length===1){vt.style.display='flex';calHall=hallItems[0];document.getElementById('viewNote').textContent=calHall;}
  else{vt.style.display='none';calHall='';if(currentView==='calendar')setView('table');}
}

function getChecked(listId){
  const all=document.querySelectorAll(`#${listId} input:not([value="__all__"])`);
  const chk=[...document.querySelectorAll(`#${listId} input:not([value="__all__"]):checked`)];
  return chk.length===all.length?[]:chk.map(c=>c.value);
}

function toggleDD(listId,btnId){
  ['listCity','listKashrut','listHall','listAccess'].forEach(id=>{
    if(id!==listId){document.getElementById(id).classList.remove('open');const b=document.getElementById(id.replace('list','btn'));if(b)b.classList.remove('open');}
  });
  document.getElementById(listId).classList.toggle('open');
  document.getElementById(btnId).classList.toggle('open');
}

document.addEventListener('click',e=>{if(!e.target.closest('.dropdown-check'))['listCity','listKashrut','listHall','listAccess'].forEach(id=>{document.getElementById(id)&&document.getElementById(id).classList.remove('open');const b=document.getElementById(id.replace('list','btn'));if(b)b.classList.remove('open');});});

function getFiltered(){
  const fv=document.getElementById('filterFrom').value,tv=document.getElementById('filterTo').value;
  const hv=getChec
