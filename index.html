<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>זמינות אולמות חתונה</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Assistant',sans-serif;background:#f7f5f0;color:#1a1a1a;min-height:100vh;display:flex;flex-direction:column;}

/* TOP AD */
#adTop{width:100%;background:#e8e4dc;align-items:center;justify-content:center;font-size:0.75rem;color:#999;border-bottom:1px solid #d5d0c8;flex-shrink:0;display:none;}

header{background:#1a1a2e;color:white;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.header-right{display:flex;align-items:center;gap:8px;}
.hamburger-btn{display:none;background:none;border:none;color:white;font-size:1.4rem;cursor:pointer;padding:2px 6px;line-height:1;}
header h1{font-size:1.1rem;font-weight:700;}
#logoImg{height:40px;display:none;border-radius:4px;}
.legend{display:flex;gap:10px;font-size:0.75rem;}
.legend-item{display:flex;align-items:center;gap:4px;}
.dot{width:9px;height:9px;border-radius:50%;}
.dot-green{background:#2ecc71;}.dot-red{background:#e74c3c;}.dot-orange{background:#f39c12;}
.header-left{display:flex;gap:8px;}
.btn-halls{padding:6px 12px;background:#e8b86d;color:#1a1a2e;border:none;border-radius:6px;cursor:pointer;font-family:'Assistant',sans-serif;font-weight:700;font-size:0.8rem;text-decoration:none;display:inline-flex;align-items:center;}

/* Main layout */
.main-layout{display:flex;flex:1;overflow:hidden;height:calc(100vh - 120px);}

/* Sidebar overlay (mobile backdrop) */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:99;}
.sidebar-overlay.open{display:block;}

/* Sidebar */
.sidebar{width:210px;min-width:190px;background:white;border-left:1px solid #e0ddd6;padding:12px 10px;overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column;height:100%;position:sticky;top:0;}
.sidebar-title{font-size:0.82rem;font-weight:700;color:#1a1a2e;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #1a1a2e;}
.filter-group{margin-bottom:11px;}
.filter-label{font-size:0.72rem;color:#666;font-weight:600;margin-bottom:4px;display:block;}
.filter-input{width:100%;padding:6px 7px;border:1px solid #ddd;border-radius:6px;font-family:'Assistant',sans-serif;font-size:0.8rem;background:#fafafa;}

.dropdown-check{position:relative;width:100%;}
.dropdown-btn{width:100%;padding:6px 8px;border:1px solid #ddd;border-radius:6px;background:#fafafa;cursor:pointer;font-family:'Assistant',sans-serif;font-size:0.8rem;text-align:right;display:flex;justify-content:space-between;align-items:center;color:#333;}
.dropdown-btn:after{content:'▼';font-size:0.5rem;color:#999;}
.dropdown-btn.open:after{content:'▲';}
.dropdown-list{display:none;position:absolute;top:100%;right:0;left:0;z-index:999;background:white;border:1px solid #ddd;border-radius:6px;box-shadow:0 4px 16px rgba(0,0,0,0.12);max-height:160px;overflow-y:auto;margin-top:2px;}
.dropdown-list.open{display:block;}
.dropdown-item{display:flex;align-items:center;gap:6px;padding:7px 9px;cursor:pointer;font-size:0.8rem;border-bottom:1px solid #f5f5f5;}
.dropdown-item:last-child{border-bottom:none;}
.dropdown-item:hover{background:#f7f5f0;}
.dropdown-item input[type=checkbox]{width:13px;height:13px;cursor:pointer;accent-color:#1a1a2e;}
.dropdown-item label{cursor:pointer;flex:1;}

.range-row{display:flex;gap:4px;align-items:center;}
.range-row input{width:48%;padding:5px 5px;border:1px solid #ddd;border-radius:5px;font-family:'Assistant',sans-serif;font-size:0.76rem;}
.range-row span{font-size:0.7rem;color:#999;}

.btn-filter{width:100%;padding:8px;background:#1a1a2e;color:white;border:none;border-radius:6px;cursor:pointer;font-family:'Assistant',sans-serif;font-weight:600;font-size:0.85rem;margin-top:4px;}
.btn-reset{width:100%;padding:6px;background:#eee;color:#444;border:none;border-radius:6px;cursor:pointer;font-family:'Assistant',sans-serif;font-size:0.78rem;margin-top:5px;}

/* Contact banner */
.contact-banner{margin-top:auto;padding-top:12px;border-top:1px solid #eee;}
.btn-admin{width:100%;padding:6px;background:#f0f0f0;color:#555;border:1px solid #ddd;border-radius:5px;cursor:pointer;font-family:'Assistant',sans-serif;font-size:0.72rem;}
.btn-admin:hover{background:#e8e8e8;}

/* AD SIDEBAR */
#adSidebar{width:130px;background:#e8e4dc;display:flex;align-items:center;justify-content:center;font-size:0.7rem;color:#999;flex-shrink:0;border-right:1px solid #d5d0c8;position:sticky;top:0;align-self:flex-start;max-height:100vh;}

/* Table area */
.table-area{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:8px;height:100%;}

.view-toggle{display:none;gap:8px;margin-bottom:8px;align-items:center;flex-shrink:0;}
.view-btn{padding:5px 12px;border:1px solid #ddd;border-radius:5px;background:white;cursor:pointer;font-family:'Assistant',sans-serif;font-size:0.76rem;color:#555;}
.view-btn.active{background:#1a1a2e;color:white;border-color:#1a1a2e;}
.view-note{font-size:0.72rem;color:#999;}

.table-scroll{overflow:auto;flex:1;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,0.07);}
table{border-collapse:collapse;background:white;font-size:0.68rem;width:max-content;min-width:100%;}
thead{position:sticky;top:0;z-index:10;}
thead tr{background:#1a1a2e;color:white;}
th{padding:8px 5px;text-align:center;font-weight:600;font-size:0.65rem;white-space:nowrap;}
th.date-col{text-align:right;min-width:100px;position:sticky;right:0;background:#1a1a2e;z-index:11;}
td{padding:0;text-align:center;border-bottom:1px solid #f0ece4;height:32px;}
td.date-cell{text-align:right;font-weight:600;color:#333;white-space:nowrap;background:#fafaf7;position:sticky;right:0;border-left:2px solid #e8e4dc;padding:3px 5px;z-index:5;}
.date-greg{font-size:0.6rem;color:#bbb;display:block;font-weight:400;}
.cell-status{display:block;width:100%;height:32px;line-height:32px;font-size:0.65rem;font-weight:700;text-align:center;}
.cell-free{background:#d4f5e4;color:#1a7a45;}
.cell-taken{background:#fde8e8;color:#a32020;}
.cell-reserved{background:#fef3cd;color:#8a5c00;}

/* Calendar */
.calendar-view{display:none;overflow-y:auto;flex:1;}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.cal-nav{padding:5px 12px;background:#1a1a2e;color:white;border:none;border-radius:5px;cursor:pointer;font-family:'Assistant',sans-serif;font-size:0.8rem;}
.cal-title{font-size:0.9rem;font-weight:700;color:#1a1a2e;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-day-header{text-align:center;font-size:0.68rem;color:#999;font-weight:600;padding:3px;}
.cal-cell{min-height:52px;border-radius:5px;padding:3px;font-size:0.65rem;border:1px solid #eee;background:white;}
.cal-cell.empty{background:transparent;border:none;}
.cal-date-he{font-size:0.6rem;color:#555;font-weight:600;}
.cal-date-greg{font-size:0.58rem;color:#aaa;display:block;margin-bottom:2px;}
.cal-status{font-size:0.58rem;font-weight:700;padding:1px 3px;border-radius:3px;margin-top:2px;display:inline-block;}

.loading{text-align:center;padding:50px;color:#888;font-size:0.9rem;}
.error{text-align:center;padding:30px;color:#e74c3c;font-size:0.85rem;}

/* BOTTOM AD */
#adBottom{position:fixed;bottom:0;right:0;left:0;height:2.5cm;background:#1a1a2e;display:none;align-items:center;justify-content:center;font-size:0.85rem;color:#e8b86d;font-weight:600;border-top:2px solid #e8b86d;z-index:500;}
#adBottom a{color:#e8b86d;text-decoration:none;}
.ad-bottom-spacer{height:2.5cm;flex-shrink:0;}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:white;border-radius:10px;padding:24px;width:320px;max-width:90vw;}
.modal h2{font-size:1rem;margin-bottom:16px;color:#1a1a2e;}
.modal input{width:100%;padding:9px;border:1px solid #ddd;border-radius:6px;font-family:'Assistant',sans-serif;font-size:0.9rem;margin-bottom:10px;}
.modal .modal-btns{display:flex;gap:8px;}
.modal .btn-ok{flex:1;padding:9px;background:#1a1a2e;color:white;border:none;border-radius:6px;cursor:pointer;font-family:'Assistant',sans-serif;font-weight:600;}
.modal .btn-cancel{padding:9px 14px;background:#eee;color:#444;border:none;border-radius:6px;cursor:pointer;font-family:'Assistant',sans-serif;}
.modal .error-msg{color:#e74c3c;font-size:0.78rem;margin-bottom:8px;display:none;}

/* ===== MOBILE ===== */
@media(max-width:700px){
  .main-layout{flex-direction:column;height:auto;overflow:visible;}

  /* Hide sidebar by default on mobile — shows as fixed overlay */
  .sidebar{
    display:none;
    position:fixed;
    top:0; right:0; bottom:0;
    width:270px;
    height:100vh;
    z-index:100;
    box-shadow:-4px 0 20px rgba(0,0,0,0.25);
    border-left:none;
  }
  .sidebar.open{display:flex;}

  /* Show hamburger on mobile */
  .hamburger-btn{display:inline-block;}

  .ad-sidebar{display:none;}
  .legend{display:none;}

  /* Table area takes full height */
  .table-area{height:calc(100vh - 56px);padding:6px;}
}
</style>
</head>
<body>

<!-- TOP AD (dynamic, shown only if configured) -->
<div id="adTop" style="height:60px;"></div>

<header id="siteHeader">
  <div class="header-right">
    <button class="hamburger-btn" onclick="toggleSidebar()">☰</button>
    <img id="logoImg" src="" alt="לוגו"/>
    <h1 id="siteNameEl">זמינות אולמות חתונה</h1>
    <div class="legend">
      <div class="legend-item"><div class="dot dot-green"></div> פנוי</div>
      <div class="legend-item"><div class="dot dot-red"></div> תפוס</div>
      <div class="legend-item"><div class="dot dot-orange"></div> שמור</div>
    </div>
  </div>
  <div class="header-left">
    <a href="halls.html" class="btn-halls">🏛 מידע על אולמות</a>
  </div>
</header>

<!-- Mobile backdrop -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<div class="main-layout">
  <!-- SIDEBAR -->
  <div class="sidebar" id="mainSidebar">
    <div class="sidebar-title">🔍 סינון</div>

    <div class="filter-group">
      <span class="filter-label">מתאריך</span>
      <input type="date" id="filterFrom" class="filter-input"/>
    </div>
    <div class="filter-group">
      <span class="filter-label">עד תאריך</span>
      <input type="date" id="filterTo" class="filter-input"/>
    </div>
    <div class="filter-group">
      <span class="filter-label" style="font-size:0.65rem;color:#999">או חפש חודש עברי</span>
      <select id="filterHeMonth" class="filter-input" onchange="applyHebrewMonthFilter()" style="font-size:0.75rem;">
        <option value="">-- בחר חודש עברי --</option>
        <option value="תשרי">תשרי</option><option value="חשון">חשון</option>
        <option value="כסלו">כסלו</option><option value="טבת">טבת</option>
        <option value="שבט">שבט</option><option value="אדר">אדר</option>
        <option value="אדר ב">אדר ב</option><option value="ניסן">ניסן</option>
        <option value="אייר">אייר</option><option value="סיון">סיון</option>
        <option value="תמוז">תמוז</option><option value="אב">אב</option>
        <option value="אלול">אלול</option>
      </select>
    </div>

    <div class="filter-group">
      <span class="filter-label">עיר</span>
      <div class="dropdown-check">
        <button class="dropdown-btn" id="btnCity" onclick="toggleDD('listCity','btnCity')"><span id="lblCity">הכל</span></button>
        <div class="dropdown-list" id="listCity"></div>
      </div>
    </div>

    <div class="filter-group">
      <span class="filter-label">כשרות</span>
      <div class="dropdown-check">
        <button class="dropdown-btn" id="btnKashrut" onclick="toggleDD('listKashrut','btnKashrut')"><span id="lblKashrut">הכל</span></button>
        <div class="dropdown-list" id="listKashrut"></div>
      </div>
    </div>

    <div class="filter-group">
      <span class="filter-label">אולם</span>
      <div class="dropdown-check">
        <button class="dropdown-btn" id="btnHall" onclick="toggleDD('listHall','btnHall')"><span id="lblHall">הכל</span></button>
        <div class="dropdown-list" id="listHall"></div>
      </div>
    </div>

    <div class="filter-group">
      <span class="filter-label">מס' מקומות</span>
      <div class="range-row">
        <input type="number" id="seatsMin" placeholder="מינ'" />
        <span>—</span>
        <input type="number" id="seatsMax" placeholder="מקס'" />
      </div>
    </div>

    <div class="filter-group">
      <span class="filter-label">נגישות</span>
      <div class="dropdown-check">
        <button class="dropdown-btn" id="btnAccess" onclick="toggleDD('listAccess','btnAccess')"><span id="lblAccess">הכל</span></button>
        <div class="dropdown-list" id="listAccess"></div>
      </div>
    </div>

    <button class="btn-filter" onclick="applyFilters()">סנן</button>
    <button class="btn-reset" onclick="resetFilters()">איפוס</button>

    <!-- Contact banner -->
    <div class="contact-banner">
      <a href="mailto:admin@example.com" id="contactMailLink" style="display:block;text-align:center;padding:9px;background:#1a1a2e;color:white;border-radius:6px;text-decoration:none;font-weight:600;font-size:0.82rem;margin-bottom:8px;">📬 יצירת קשר והערות</a>
      <button class="btn-admin" onclick="openAdmin()">🔐 כניסה לניהול</button>
    </div>
  </div>

  <!-- TABLE AREA -->
  <div class="table-area">
    <div class="view-toggle" id="viewToggle">
      <button class="view-btn active" id="btnTableView" onclick="setView('table')">טבלה</button>
      <button class="view-btn" id="btnCalView" onclick="setView('calendar')">לוח שנה חודשי</button>
      <span class="view-note" id="viewNote"></span>
    </div>

    <div class="loading" id="loading">טוען נתונים...</div>
    <div class="error" id="errorMsg" style="display:none"></div>

    <div class="table-scroll" id="tableView">
      <table id="mainTable" style="display:none">
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <div class="calendar-view" id="calendarView">
      <div class="cal-header">
        <button class="cal-nav" onclick="calPrev()">◄</button>
        <div class="cal-title" id="calTitle"></div>
        <button class="cal-nav" onclick="calNext()">►</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>

    <!-- Spacer so content isn't hidden behind fixed bottom ad -->
    <div class="ad-bottom-spacer" id="adBottomSpacer" style="display:none"></div>
  </div>

  <!-- SIDEBAR AD -->
  <div id="adSidebar" style="display:none">פרסומת<br>160×600</div>
</div>

<!-- BOTTOM AD -->
<div id="adBottom"><span id="adContent">פרסומת</span></div>

<!-- Admin Modal -->
<div class="modal-overlay" id="adminModal">
  <div class="modal">
    <h2>🔐 כניסה לניהול</h2>
    <div class="error-msg" id="loginError">סיסמה שגויה</div>
    <input type="password" id="adminPass" placeholder="הכנס סיסמה..." onkeydown="if(event.key==='Enter')checkPass()"/>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeAdmin()">ביטול</button>
      <button class="btn-ok" onclick="checkPass()">כניסה</button>
    </div>
  </div>
</div>

<script>
const API_URL='https://script.google.com/macros/s/AKfycbziYMBlMR3C_QbmPmDESOkYBWPSGwJ4f2sja-Os4BKj7Xm5KLgdNkhEmY4w3_5Lq_RtnA/exec';
const DAYS_HE=['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
const DAYS_S=['א','ב','ג','ד','ה','ו','ש'];
const MONTHS_GREG=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];

let allData=[], currentView='table', calYear, calMonth, calHall='';

// Hebrew date helpers
const HD=['','א','ב','ג','ד','ה','ו','ז','ח','ט','י','יא','יב','יג','יד','טו','טז','יז','יח','יט','כ','כא','כב','כג','כד','כה','כו','כז','כח','כט','ל'];
const HH=['','ק','ר','ש','ת'],HT=['','י','כ','ל','מ','נ','ס','ע','פ','צ'],HO=['','א','ב','ג','ד','ה','ו','ז','ח','ט'];
function yearHe(y){const n=y%1000,h=Math.floor(n/100),t=Math.floor((n%100)/10),o=n%10;let r=(HH[h]||'')+(HT[t]||'')+(HO[o]||'');return r.length>1?r.slice(0,-1)+'"'+r.slice(-1):r+"'";}
function toHe(d){try{const r=d.toLocaleDateString('he-IL-u-ca-hebrew',{year:'numeric',month:'long',day:'numeric'});const m=r.match(/(\d+)\s+ב?(\S+)\s+(\d+)/);return m?(HD[+m[1]]||m[1])+"' "+m[2]+' '+yearHe(+m[3]):r;}catch(e){return '';}}
function fmtKey(d){return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();}

function parseAPI(rows){
  const result=[];
  rows.forEach(r=>{
    const keys=Object.keys(r);
    const fk=n=>keys.find(k=>k.toLowerCase().includes(n))||null;
    const dateKey=fk('date'), hallKey=fk('hallname')||fk('hall');
    const statusKey=fk('status');
    const cityKey=fk('city')||fk('location')||fk('עיר')||fk('אזור');
    const kashKey=fk('kashrut')||fk('kosher')||fk('כשרות')||fk('כשר');
    const seatsKey=fk('מקומות')||fk('seats')||fk('קיבולת')||fk('capacity');
    const accessKey=fk('נגישות')||fk('access')||fk('נגיש');
    if(!dateKey||!hallKey) return;
    let raw=r[dateKey]+'', pd=null;
    if(raw.includes('/'))pd=new Date(+raw.split('/')[2],+raw.split('/')[1]-1,+raw.split('/')[0]);
    else if(raw.includes('-'))pd=new Date(raw);
    else return;
    if(!pd||isNaN(pd)) return;
    result.push({
      dateObj:pd, dateKey:fmtKey(pd),
      hall:r[hallKey]||'',
      status:r[statusKey]||'פנוי',
      city:cityKey?r[cityKey]:'',
      kashrut:kashKey?r[kashKey]:'',
      seats:seatsKey?parseInt(r[seatsKey])||0:0,
      access:accessKey?r[accessKey]:''
    });
  });
  return result;
}

function buildCL(listId,lblId,items){
  const all=`<div class="dropdown-item"><input type="checkbox" id="${listId}_all" value="__all__" onchange="toggleAll('${listId}','${lblId}',this)"><label for="${listId}_all"><strong>הכל</strong></label></div>`;
  const opts=items.map((v,i)=>`<div class="dropdown-item"><input type="checkbox" id="${listId}_${i}" value="${v}" onchange="updateLbl('${listId}','${lblId}')"><label for="${listId}_${i}">${v}</label></div>`).join('');
  document.getElementById(listId).innerHTML=all+opts;
}

function toggleAll(listId,lblId,el){
  document.querySelectorAll(`#${listId} input:not([value="__all__"])`).forEach(c=>c.checked=el.checked);
  updateLbl(listId,lblId);
}

function updateLbl(listId,lblId){
  const allCb=document.querySelector(`#${listId} input[value="__all__"]`);
  const items=[...document.querySelectorAll(`#${listId} input:not([value="__all__"]):checked`)].map(c=>c.value);
  const total=document.querySelectorAll(`#${listId} input:not([value="__all__"])`).length;
  if(allCb) allCb.checked=items.length===total;
  document.getElementById(lblId).textContent=items.length===0||items.length===total?'הכל':items.join(', ');
  const hallItems=[...document.querySelectorAll('#listHall input:not([value="__all__"]):checked')].map(c=>c.value);
  const vt=document.getElementById('viewToggle');
  if(hallItems.length===1){vt.style.display='flex';calHall=hallItems[0];document.getElementById('viewNote').textContent=calHall;}
  else{vt.style.display='none';calHall='';if(currentView==='calendar')setView('table');}
}

function getChecked(listId){
  const all=document.querySelectorAll(`#${listId} input:not([value="__all__"])`);
  const chk=[...document.querySelectorAll(`#${listId} input:not([value="__all__"]):checked`)];
  return chk.length===all.length?[]:chk.map(c=>c.value);
}

function toggleDD(listId,btnId){
  ['listCity','listKashrut','listHall','listAccess'].forEach(id=>{
    if(id!==listId){document.getElementById(id).classList.remove('open');const b=document.getElementById(id.replace('list','btn'));if(b)b.classList.remove('open');}
  });
  document.getElementById(listId).classList.toggle('open');
  document.getElementById(btnId).classList.toggle('open');
}

document.addEventListener('click',e=>{if(!e.target.closest('.dropdown-check'))['listCity','listKashrut','listHall','listAccess'].forEach(id=>{document.getElementById(id)&&document.getElementById(id).classList.remove('open');const b=document.getElementById(id.replace('list','btn'));if(b)b.classList.remove('open');});});

function getFiltered(){
  const fv=document.getElementById('filterFrom').value,tv=document.getElementById('filterTo').value;
  const hv=getChecked('listHall'),cv=getChecked('listCity'),kv=getChecked('listKashrut'),av=getChecked('listAccess');
  const sm=parseInt(document.getElementById('seatsMin').value)||0,sx=parseInt(document.getElementById('seatsMax').value)||Infinity;
  return allData.filter(r=>{
    if(hv.length&&!hv.includes(r.hall))return false;
    if(cv.length&&!cv.includes(r.city))return false;
    if(kv.length&&!kv.includes(r.kashrut))return false;
    if(av.length&&!av.includes(r.access))return false;
    if(r.seats&&(r.seats<sm||r.seats>sx))return false;
    if(fv&&r.dateObj<new Date(fv))return false;
    if(tv&&r.dateObj>new Date(tv))return false;
    return true;
  });
}

function genDates(from,to){const ds=[],d=new Date(from);d.setHours(0,0,0,0);const e=new Date(to);e.setHours(0,0,0,0);while(d<=e){ds.push(new Date(d));d.setDate(d.getDate()+1);}return ds;}
function sCls(s){if(!s)return 'cell-free';const v=s.trim();return(v==='תפוס'||v==='taken'||v==='booked')?'cell-taken':(v==='שמור'||v==='reserved'||v==='pending')?'cell-reserved':'cell-free';}
function sTxt(s){if(!s)return 'פנוי';const v=s.trim();return(v==='תפוס'||v==='taken'||v==='booked')?'תפוס':(v==='שמור'||v==='reserved'||v==='pending')?'שמור':'פנוי';}

function buildTable(){
  const fd=getFiltered();
  const hv=getChecked('listHall');
  let halls=[...new Set(fd.map(r=>r.hall))].sort();
  if(hv.length)halls=halls.filter(h=>hv.includes(h));
  const lk={};fd.forEach(r=>{lk[r.dateKey+'|'+r.hall]=r.status;});
  const today=new Date();today.setHours(0,0,0,0);
  const end=new Date();end.setDate(today.getDate()+365);
  const fv=document.getElementById('filterFrom').value,tv=document.getElementById('filterTo').value;
  const from=fv?new Date(fv):today,to=tv?new Date(tv):end;
  const dates=genDates(from,to);
  let hRow='<tr><th class="date-col">תאריך</th>';
  halls.forEach(h=>{hRow+=`<th>${h}</th>`;});
  hRow+='</tr>';
  document.getElementById('tableHead').innerHTML=hRow;
  let body='';
  dates.forEach(d=>{
    const key=fmtKey(d),he=toHe(d),greg=key,day=DAYS_HE[d.getDay()];
    body+=`<tr><td class="date-cell">${he}<span class="date-greg">${greg} | יום ${day}</span></td>`;
    halls.forEach(h=>{const s=lk[key+'|'+h]||null;const cls=sCls(s);const txt=sTxt(s);body+=`<td><span class="cell-status ${cls}">${txt}</span></td>`;});
    body+='</tr>';
  });
  document.getElementById('tableBody').innerHTML=body;
  document.getElementById('mainTable').style.display='table';
}

function setView(v){
  currentView=v;
  document.getElementById('btnTableView').classList.toggle('active',v==='table');
  document.getElementById('btnCalView').classList.toggle('active',v==='calendar');
  document.getElementById('tableView').style.display=v==='table'?'block':'none';
  document.getElementById('calendarView').style.display=v==='calendar'?'block':'none';
  if(v==='calendar')renderCal();
}

function renderCal(){
  if(!calYear){const n=new Date();calYear=n.getFullYear();calMonth=n.getMonth();}
  const first=new Date(calYear,calMonth,1),last=new Date(calYear,calMonth+1,0);
  const heM=first.toLocaleDateString('he-IL-u-ca-hebrew',{month:'long',year:'numeric'});
  document.getElementById('calTitle').textContent=MONTHS_GREG[calMonth]+' '+calYear+' | '+heM;
  const lk={};
  allData.filter(r=>r.hall===calHall&&r.dateObj>=first&&r.dateObj<=last).forEach(r=>{lk[r.dateKey]=r.status;});
  let html='';
  DAYS_S.forEach(d=>{html+=`<div class="cal-day-header">${d}</div>`;});
  for(let i=0;i<first.getDay();i++)html+=`<div class="cal-cell empty"></div>`;
  for(let day=1;day<=last.getDate();day++){
    const d=new Date(calYear,calMonth,day),key=fmtKey(d),s=lk[key]||null;
    const he=toHe(d),cls=sCls(s),txt=sTxt(s);
    const bg=cls==='cell-free'?'#d4f5e4':cls==='cell-taken'?'#fde8e8':'#fef3cd';
    const cl=cls==='cell-free'?'#1a7a45':cls==='cell-taken'?'#a32020':'#8a5c00';
    html+=`<div class="cal-cell"><div class="cal-date-he">${he}</div><div class="cal-date-greg">${day}/${calMonth+1}</div><span class="cal-status" style="background:${bg};color:${cl}">${txt}</span></div>`;
  }
  document.getElementById('calGrid').innerHTML=html;
}

function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCal();}
function calNext(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCal();}
function applyFilters(){buildTable();if(currentView==='calendar')renderCal();}
function resetFilters(){
  const t=new Date(),e=new Date();e.setDate(t.getDate()+365);
  document.getElementById('filterFrom').value=t.toISOString().split('T')[0];
  document.getElementById('filterTo').value=e.toISOString().split('T')[0];
  ['listHall','listCity','listKashrut','listAccess'].forEach(id=>{
    document.querySelectorAll(`#${id} input`).forEach(c=>c.checked=false);
    document.getElementById(id.replace('list','lbl')).textContent='הכל';
  });
  document.getElementById('seatsMin').value='';document.getElementById('seatsMax').value='';
  document.getElementById('viewToggle').style.display='none';calHall='';
  if(currentView==='calendar')setView('table');
  buildTable();
}

// Admin
function openAdmin(){document.getElementById('adminModal').classList.add('open');document.getElementById('adminPass').focus();}
function closeAdmin(){document.getElementById('adminModal').classList.remove('open');document.getElementById('adminPass').value='';document.getElementById('loginError').style.display='none';}
function checkPass(){
  const p=document.getElementById('adminPass').value;
  const correct=(window._settings&&window._settings.adminPass)||'CHANGE_ME';
  if(p===correct){closeAdmin();window.location.href='admin.html';}
  else{document.getElementById('loginError').style.display='block';}
}

function populateFilters(){
  const cities=[...new Set(allData.map(r=>r.city).filter(Boolean))].sort();
  const kash=[...new Set(allData.map(r=>r.kashrut).filter(Boolean))].sort();
  const halls=[...new Set(allData.map(r=>r.hall))].sort();
  const access=[...new Set(allData.map(r=>r.access).filter(Boolean))].sort();
  buildCL('listCity','lblCity',cities);
  buildCL('listKashrut','lblKashrut',kash);
  buildCL('listHall','lblHall',halls);
  buildCL('listAccess','lblAccess',access);
}

function loadSettings(){
  const s=window._settings||{};
  // Logo
  if(s.logo){const el=document.getElementById('logoImg');el.src=s.logo;el.style.display='block';}
  // Site name
  if(s.siteName)document.getElementById('siteNameEl').textContent=s.siteName;
  // Header color
  if(s.headerColor)document.getElementById('siteHeader').style.background=s.headerColor;
  // Contact email
  if(s.contactEmail){const cm=document.getElementById('contactMailLink');if(cm)cm.href='mailto:'+s.contactEmail;}

  // Bottom ad
  const adBottom=document.getElementById('adBottom');
  const spacer=document.getElementById('adBottomSpacer');
  if(adBottom){
    const showBottom=s.showAdBottom!=='false'&&s.showAdBottom!==false;
    if(showBottom){
      adBottom.style.display='flex';
      if(spacer)spacer.style.display='block';
      const c=document.getElementById('adContent');
      const txt=s.adTextBottom||'פרסומת';
      if(c){if(s.adLinkBottom)c.innerHTML=`<a href="${s.adLinkBottom}" target="_blank">${txt}</a>`;else c.textContent=txt;}
    } else {
      adBottom.style.display='none';
      if(spacer)spacer.style.display='none';
    }
  }

  // Side ad
  const adSide=document.getElementById('adSidebar');
  if(adSide){
    const showSide=s.showAdSide!=='false'&&s.showAdSide!==false;
    if(showSide){
      adSide.style.display='flex';
      const txt=s.adTextSide||'פרסומת צדדית';
      if(s.adLinkSide)adSide.innerHTML=`<a href="${s.adLinkSide}" target="_blank" style="color:#999;text-decoration:none">${txt}</a>`;
      else adSide.innerHTML=txt;
    } else adSide.style.display='none';
  }

  // Top ad
  const adTop=document.getElementById('adTop');
  if(adTop){
    const showTop=s.showAdTop!=='false'&&s.showAdTop!==false;
    if(showTop&&s.adTextTop){
      adTop.style.display='flex';
      if(s.adLinkTop)adTop.innerHTML=`<a href="${s.adLinkTop}" target="_blank" style="color:#999;text-decoration:none">${s.adTextTop}</a>`;
      else adTop.textContent=s.adTextTop;
    } else {
      adTop.style.display='none';
    }
  }
}

function applyHebrewMonthFilter(){
  const month=document.getElementById('filterHeMonth').value;
  if(!month) return;
  const matchingDates=allData.filter(r=>{const he=toHe(r.dateObj);return he.includes(month);});
  if(!matchingDates.length) return;
  const sorted=matchingDates.map(r=>r.dateObj).sort((a,b)=>a-b);
  document.getElementById('filterFrom').value=sorted[0].toISOString().split('T')[0];
  document.getElementById('filterTo').value=sorted[sorted.length-1].toISOString().split('T')[0];
  applyFilters();
}

async function fetchData(){
  if(sessionStorage.getItem('hd')){sessionStorage.removeItem('hd');sessionStorage.removeItem('ht');}
  try{
    const CACHE_MS=1*60*1000;
    const cached=sessionStorage.getItem('alldata'),cachedTime=+sessionStorage.getItem('alltime')||0;
    let availData, settingsData={}, hallsData=[];
    if(cached&&Date.now()-cachedTime<CACHE_MS){
      const bundle=JSON.parse(cached);
      availData=bundle.avail||[];
      settingsData=bundle.settings||{};
      hallsData=bundle.halls||[];
    } else {
      const [r1,r2,r3]=await Promise.all([
        fetch(API_URL),
        fetch(API_URL+'?action=settings'),
        fetch(API_URL+'?action=halls')
      ]);
      availData=r1.ok?await r1.json():[];
      settingsData=r2.ok?await r2.json():{};
      hallsData=r3.ok?await r3.json():[];
      sessionStorage.setItem('alldata',JSON.stringify({avail:availData,settings:settingsData,halls:hallsData}));
      sessionStorage.setItem('alltime',Date.now().toString());
    }
    window._settings=settingsData;
    window._hallDetails=hallsData;
    allData=parseAPI(availData);
    if(!allData.length)throw new Error('empty');
    const map={};
    (hallsData||[]).forEach(d=>{map[d.name]={city:d.city||'',kashrut:d.kashrut||'',access:d.access||'',seats:parseInt(d.seats)||0};});
    allData.forEach(r=>{if(map[r.hall]){r.city=map[r.hall].city;r.kashrut=map[r.hall].kashrut;r.access=map[r.hall].access;r.seats=map[r.hall].seats;}});
    populateFilters();
    const t=new Date(),e=new Date();e.setDate(t.getDate()+365);
    document.getElementById('filterFrom').value=t.toISOString().split('T')[0];
    document.getElementById('filterTo').value=e.toISOString().split('T')[0];
    document.getElementById('loading').style.display='none';
    buildTable();
    loadSettings();
  }catch(err){
    document.getElementById('loading').style.display='none';
    if(!allData.length){
      document.getElementById('errorMsg').style.display='block';
      document.getElementById('errorMsg').textContent='שגיאה בטעינת הנתונים. ודא שהגיליון משותף ציבורית.';
    }
  }
}

function toggleSidebar(){
  const sb=document.getElementById('mainSidebar');
  const ov=document.getElementById('sidebarOverlay');
  sb.classList.toggle('open');
  ov.classList.toggle('open');
}

fetchData();
</script>
