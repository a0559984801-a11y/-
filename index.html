<script>
const API_URL='https://script.google.com/macros/s/AKfycbylfK2AoCFcDCpvRWCS6DB3ciPL0VvzsrlNhtmhOxIuxW7v5LmI6Sic5vTvY37gae3mWQ/exec';
// Safe JSON parse - never crashes on bad data
function safeParse(str,fallback){
  if(!str) return fallback;
  try{ return JSON.parse(str); }catch(e){ return fallback; }
}
// Log visit to Google Sheets (fire and forget, never blocks the page)
function logVisit(page){
  // Fire after load + idle so the slow Apps Script beacon never extends the load event.
  const fire=()=>{try{
    const device=/Mobi|Android|iPhone|iPad/i.test(navigator.userAgent)?'mobile':'desktop';
    new Image().src=API_URL+'?action=logVisit&page='+encodeURIComponent(page)+'&device='+device+'&t='+Date.now();
  }catch(e){}};
  const sched=()=>window.requestIdleCallback?window.requestIdleCallback(fire):setTimeout(fire,1);
  if(document.readyState==='complete') sched();
  else window.addEventListener('load',sched,{once:true});
}
function logHallView(name){

    const device=/Mobi|Android|iPhone|iPad/i.test(navigator.userAgent)?'mobile':'desktop';

}
const DAYS_HE=['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
const DAYS_S=['א','ב','ג','ד','ה','ו','ש'];
const MONTHS_GREG=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];

let allData=[], currentView='table', calYear, calMonth, calHall='', selectedDateKey=null;
let localHiddenDays=[];
const localHiddenDates=new Set();

function initDayToggles(){
  try{ localHiddenDays=JSON.parse((window._settings&&window._settings.hiddenDays)||'[]'); }catch(e){ localHiddenDays=[]; }
  localHiddenDays.forEach(i=>{ const b=document.getElementById('dayBtn'+i); if(b) b.classList.add('hidden-day'); });
  localHiddenDates.clear();
  try{ JSON.parse((window._settings&&window._settings.hiddenDates)||'[]').forEach(k=>localHiddenDates.add(k)); }catch(e){}
}

function toggleDayVisibility(i){
  const btn=document.getElementById('dayBtn'+i);
  if(localHiddenDays.includes(i)){
    localHiddenDays=localHiddenDays.filter(d=>d!==i);
    btn.classList.remove('hidden-day');
  } else {
    localHiddenDays.push(i);
    btn.classList.add('hidden-day');
  }
  buildTable();
}
let adTimers={Top:null,Bottom:null,Side:null};
let adPlaylists={Top:[],Bottom:[],Side:[]},adIndex={Top:0,Bottom:0,Side:0};

// Flatten every ad item into one ordered playlist of {ad, media}:
// base image/video first, then each gallery item. Rotation cycles the whole
// list in an infinite loop so image→image→video→(next ad)→… all play.
function buildPlaylist(items){
  const pl=[];
  (items||[]).forEach(ad=>{
    if(ad.img) pl.push({ad,media:{type:'image',url:ad.img,urlMobile:ad.imgMobile}});
    else if(ad.vid) pl.push({ad,media:{type:'video',url:ad.vid}});
    (ad.gallery||[]).forEach(m=>{ if(m&&(m.url||m.urlMobile)) pl.push({ad,media:m}); });
  });
  return pl;
}

function showAdSlide(pos,i){
  const slide=adPlaylists[pos][i];
  if(!slide) return;
  if(pos==='Bottom') updateBottomAdMedia(slide.ad,slide.media);
  else if(pos==='Side') updateSideAdMedia(slide.ad,slide.media);
}

function scheduleAd(pos){
  const pl=adPlaylists[pos];
  if(pl.length<2) return; // nothing to rotate
  const cur=pl[adIndex[pos]];
  const dur=Math.max(2000,(cur.ad.duration||5)*1000);
  clearTimeout(adTimers[pos]);
  adTimers[pos]=setTimeout(()=>{
    adIndex[pos]=(adIndex[pos]+1)%pl.length;
    showAdSlide(pos,adIndex[pos]);
    scheduleAd(pos);
  },dur);
}

// Start (or restart) a position's rotation. Returns false if there's no media.
function startAd(pos,items){
  clearTimeout(adTimers[pos]);
  const pl=buildPlaylist(items);
  adPlaylists[pos]=pl;
  adIndex[pos]=0;
  if(!pl.length) return false;
  showAdSlide(pos,0);
  scheduleAd(pos);
  return true;
}

function wrapLink(link,html){
  return link?`<a href="${link}" target="_blank" style="display:block;width:100%;height:100%;text-decoration:none;position:relative;">${html}</a>`:html;
}

const IS_MOBILE=/Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
function pickUrl(media){return (IS_MOBILE&&media.urlMobile)?media.urlMobile:media.url;}

function updateBottomAdMedia(ad,media){
  const content=document.getElementById('adBottomContent');
  if(!content) return;
  const txt=ad.text||'';
  const link=ad.link;
  const url=pickUrl(media);
  let inner='';
  if(media.type==='video') inner+=`<video autoplay loop muted><source src="${url}" type="video/mp4"/></video>`;
  else inner+=`<img src="${url}"/>`;
  if(txt) inner+=`<span class="ad-bottom-text">${txt}</span>`;
  content.innerHTML=wrapLink(link,inner);
}

function updateSideAdMedia(ad,media){
  const adSide=document.getElementById('adSidebar');
  if(!adSide) return;
  const url=pickUrl(media);
  let inner='';
  if(media.type==='video') inner=`<video autoplay loop muted style="width:100%;height:100%;object-fit:cover;"><source src="${url}" type="video/mp4"/></video>`;
  else inner=`<img src="${url}" style="width:100%;height:100%;object-fit:cover;display:block;"/>`;
  adSide.innerHTML=wrapLink(ad.link,inner);
}

function updateBottomAd(ad){
  const content=document.getElementById('adBottomContent');
  if(!content) return;
  const txt=ad.text||'';
  const link=ad.link;
  const img=(IS_MOBILE&&ad.imgMobile)?ad.imgMobile:(ad.img||null);
  const vid=ad.vid;
  let inner='';
  if(img) inner+=`<img src="${img}"/>`;
  else if(vid) inner+=`<video autoplay loop muted><source src="${vid}" type="video/mp4"/></video>`;
  if(txt) inner+=`<span class="ad-bottom-text">${txt}</span>`;
  content.innerHTML=wrapLink(link,inner);
}

function updateSideAd(ad){
  const adSide=document.getElementById('adSidebar');
  if(!adSide) return;
  const txt=ad.text||'פרסומת צדדית';
  const link=ad.link;
  const img=(IS_MOBILE&&ad.imgMobile)?ad.imgMobile:(ad.img||null);
  const vid=ad.vid;
  let inner='';
  if(img) inner=`<img src="${img}" style="width:100%;height:100%;object-fit:cover;display:block;"/>`;
  else if(vid) inner=`<video autoplay loop muted style="width:100%;height:100%;object-fit:cover;"><source src="${vid}" type="video/mp4"/></video>`;
  else inner=`<span style="color:#999">${txt}</span>`;
  adSide.innerHTML=wrapLink(link,inner);
}

// Hebrew date helpers
const HD=['','א','ב','ג','ד','ה','ו','ז','ח','ט','י','יא','יב','יג','יד','טו','טז','יז','יח','יט','כ','כא','כב','כג','כד','כה','כו','כז','כח','כט','ל'];
const HH=['','ק','ר','ש','ת'],HT=['','י','כ','ל','מ','נ','ס','ע','פ','צ'],HO=['','א','ב','ג','ד','ה','ו','ז','ח','ט'];
function yearHe(y){const n=y%1000,h=Math.floor(n/100),t=Math.floor((n%100)/10),o=n%10;let r=(HH[h]||'')+(HT[t]||'')+(HO[o]||'');return r.length>1?r.slice(0,-1)+'"'+r.slice(-1):r+"'";}
function toHe(d){try{const r=d.toLocaleDateString('he-IL-u-ca-hebrew',{year:'numeric',month:'long',day:'numeric'});const m=r.match(/(\d+)\s+ב?(\S+)\s+(\d+)/);return m?(HD[+m[1]]||m[1])+"' "+m[2]+' '+yearHe(+m[3]):r;}catch(e){return '';}}
function fmtKey(d){return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();}

function parseAPI(rows){
  const result=[];
  rows.forEach(r=>{
    const keys=Object.keys(r);
    const fk=n=>keys.find(k=>k.toLowerCase().includes(n))||null;
    const dateKey=fk('date'), hallKey=fk('hallname')||fk('hall');
    const statusKey=fk('status');
    const cityKey=fk('city')||fk('location')||fk('עיר')||fk('אזור');
    const kashKey=fk('kashrut')||fk('kosher')||fk('כשרות')||fk('כשר');
    const seatsKey=fk('מקומות')||fk('seats')||fk('קיבולת')||fk('capacity');
    const accessKey=fk('נגישות')||fk('access')||fk('נגיש');
    if(!dateKey||!hallKey) return;
    let raw=r[dateKey]+'', pd=null;
    if(raw.includes('/'))pd=new Date(+raw.split('/')[2],+raw.split('/')[1]-1,+raw.split('/')[0]);
    else if(raw.includes('-')){
      if(raw.includes('T')||raw.includes(':')){
        // ISO timestamp from Google (e.g., "2026-06-13T21:00:00.000Z")
        // Let Date convert UTC to local time so the date matches the sheet.
        pd=new Date(raw);
      } else {
        // Plain yyyy-mm-dd with no time: build a local date to avoid UTC shift.
        const dp=raw.split('-');
        pd=new Date(+dp[0],+dp[1]-1,+dp[2]);
      }
    }
    else return;
    if(!pd||isNaN(pd)) return;
    result.push({
      dateObj:pd, dateKey:fmtKey(pd),
      hall:r[hallKey]||'',
      status:r[statusKey]||'פנוי',
      city:cityKey?r[cityKey]:'',
      kashrut:kashKey?r[kashKey]:'',
      seats:seatsKey?parseInt(r[seatsKey])||0:0,
      access:accessKey?r[accessKey]:''
    });
  });
  return result;
}

function buildCL(listId,lblId,items){
  const all=`<div class="dropdown-item"><input type="checkbox" id="${listId}_all" value="__all__" onchange="toggleAll('${listId}','${lblId}',this)"><label for="${listId}_all"><strong>הכל</strong></label></div>`;
  const opts=items.map((v,i)=>`<div class="dropdown-item"><input type="checkbox" id="${listId}_${i}" value="${v}" onchange="updateLbl('${listId}','${lblId}')"><label for="${listId}_${i}">${v}</label></div>`).join('');
  document.getElementById(listId).innerHTML=all+opts;
}

function toggleAll(listId,lblId,el){
  document.querySelectorAll(`#${listId} input:not([value="__all__"])`).forEach(c=>c.checked=el.checked);
  updateLbl(listId,lblId);
}

function updateLbl(listId,lblId){
  const allCb=document.querySelector(`#${listId} input[value="__all__"]`);
  const items=[...document.querySelectorAll(`#${listId} input:not([value="__all__"]):checked`)].map(c=>c.value);
  const total=document.querySelectorAll(`#${listId} input:not([value="__all__"])`).length;
  if(allCb) allCb.checked=items.length===total;
  document.getElementById(lblId).textContent=items.length===0||items.length===total?'הכל':items.join(', ');
  const hallItems=[...document.querySelectorAll('#listHall input:not([value="__all__"]):checked')].map(c=>c.value);
  const vt=document.getElementById('viewToggle');
  if(hallItems.length===1){vt.style.display='flex';calHall=hallItems[0];document.getElementById('viewNote').textContent=calHall;}
  else{vt.style.display='none';calHall='';if(currentView==='calendar')setView('table');}
}

function getChecked(listId){
  const all=document.querySelectorAll(`#${listId} input:not([value="__all__"])`);
  const chk=[...document.querySelectorAll(`#${listId} input:not([value="__all__"]):checked`)];
  return chk.length===all.length?[]:chk.map(c=>c.value);
}

function toggleDD(listId,btnId){
  ['listCity','listKashrut','listHall','listAccess'].forEach(id=>{
    if(id!==listId){document.getElementById(id).classList.remove('open');const b=document.getElementById(id.replace('list','btn'));if(b)b.classList.remove('open');}
  });
  document.getElementById(listId).classList.toggle('open');
  document.getElementById(btnId).classList.toggle('open');
}

const _ddIds=[['listCity','btnCity'],['listKashrut','btnKashrut'],['listHall','btnHall'],['listAccess','btnAccess']];
document.addEventListener('click',e=>{if(!e.target.closest('.dropdown-check'))_ddIds.forEach(([l,b])=>{const le=document.getElementById(l),be=document.getElementById(b);if(le)le.classList.remove('open');if(be)be.classList.remove('open');});},{passive:true});

function getFiltered(){
  const fv=document.getElementById('filterFrom').value,tv=document.getElementById('filterTo').value;
  const hv=getChecked('listHall'),cv=getChecked('listCity'),kv=getChecked('listKashrut'),av=getChecked('listAccess');
  const sm=parseInt(document.getElementById('seatsMin').value)||0,sx=parseInt(document.getElementById('seatsMax').value)||Infinity;
  return allData.filter(r=>{
    if(hv.length&&!hv.includes(r.hall))return false;
    if(cv.length&&!cv.includes(r.city))return false;
    if(kv.length&&!kv.includes(r.kashrut))return false;
    if(av.length&&!av.includes(r.access))return false;
    if(r.seats&&(r.seats<sm||r.seats>sx))return false;
    if(fv&&r.dateObj<new Date(fv))return false;
    if(tv&&r.dateObj>new Date(tv))return false;
    return true;
  });
}

function genDates(from,to){const ds=[],d=new Date(from);d.setHours(0,0,0,0);const e=new Date(to);e.setHours(0,0,0,0);while(d<=e){ds.push(new Date(d));d.setDate(d.getDate()+1);}return ds;}
function sCls(s){if(!s)return 'cell-free';const v=s.trim();return(v==='תפוס'||v==='taken'||v==='booked')?'cell-taken':(v==='שמור'||v==='reserved'||v==='pending')?'cell-reserved':'cell-free';}
function sTxt(s){if(!s)return 'פנוי';const v=s.trim();return(v==='תפוס'||v==='taken'||v==='booked')?'תפוס':(v==='שמור'||v==='reserved'||v==='pending')?'שמור':'פנוי';}

function buildTable(){
  const fd=getFiltered();
  const hv=getChecked('listHall');
  const savedOrder=safeParse(window._settings&&window._settings.hallOrder,null);
  let halls=[...new Set(fd.map(r=>r.hall))];
  if(savedOrder) halls.sort((a,b)=>{const ai=savedOrder.indexOf(a),bi=savedOrder.indexOf(b);return (ai===-1?999:ai)-(bi===-1?999:bi);});
  else halls.sort();
  if(hv.length) halls=halls.filter(h=>hv.includes(h));
  const lk={};fd.forEach(r=>{lk[r.dateKey+'|'+r.hall]=r.status;});

  // If a date is selected, sort free halls first (keeping priority order)
  if(selectedDateKey){
    const free=halls.filter(h=>sCls(lk[selectedDateKey+'|'+h])==='cell-free');
    const other=halls.filter(h=>sCls(lk[selectedDateKey+'|'+h])!=='cell-free');
    halls=[...free,...other];
  }

  const today=new Date();today.setHours(0,0,0,0);
  const end=new Date();end.setDate(today.getDate()+365);
  const fv=document.getElementById('filterFrom').value,tv=document.getElementById('filterTo').value;
  const from=fv?new Date(fv):today,to=tv?new Date(tv):end;
  const dates=genDates(from,to);

  let hRow='<tr><th class="date-col">תאריך</th>';
  halls.forEach(h=>{const esc=h.replace(/'/g,"\\'");hRow+=`<th class="hall-name-th" onmouseenter="hallHoverStart('${esc}',event)" onmousemove="hallHoverMove(event)" onmouseleave="hallHoverEnd()" onclick="hallHoverEnd();openHallModal('${esc}')">${h}</th>`;});
  hRow+='</tr>';
  document.getElementById('tableHead').innerHTML=hRow;

  const hiddenDays=localHiddenDays;
  const colCount=halls.length+1;
  let body='';
  let prevWasHidden=false;
  dates.forEach(d=>{
    const key=fmtKey(d);
    const isHidden=hiddenDays.includes(d.getDay())||localHiddenDates.has(key);
    if(isHidden){
      if(!prevWasHidden) body+=`<tr class="hidden-day-gap"><td colspan="${colCount}"></td></tr>`;
      prevWasHidden=true;
      return;
    }
    prevWasHidden=false;
    const he=toHe(d),greg=key,day=DAYS_HE[d.getDay()];
    const isSelected=key===selectedDateKey;
    body+=`<tr><td class="date-cell${isSelected?' selected':''}" onclick="clickDate('${key}')" onmouseenter="dateHoverStart(event)" onmouseleave="dateHoverEnd()" onmousemove="dateHoverMove(event)">${he}<span class="date-greg">${greg} | יום ${day}</span></td>`;
    halls.forEach(h=>{const s=lk[key+'|'+h]||null;const cls=sCls(s);const txt=sTxt(s);body+=`<td><span class="cell-status ${cls}">${txt}</span></td>`;});
    body+='</tr>';
  });
  document.getElementById('tableBody').innerHTML=body;
  document.getElementById('mainTable').style.display='table';
}

function clickDate(key){
  // Toggle: click same date = reset, click new date = sort
  selectedDateKey=(selectedDateKey===key)?null:key;
  dateHoverEnd();
  buildTable();
}

function openHallModal(name){
  const details=(window._hallDetails||[]).find(h=>h.name===name);
  if(!details) return;
  logHallView(name);

  document.getElementById('hallModalTitle').textContent=details.name;

  // Gallery hidden in table view — images only in halls.html
  hallModalImages=[];
  document.getElementById('hallGallery').style.display='none';

  // Fields
  const rows=[];
  if(details.city) rows.push(['📍 עיר',details.city]);
  if(details.street) rows.push(['🏘️ רחוב',details.street]);
  if(details.phone) rows.push(['📞 טלפון',`<a href="tel:${details.phone}">${details.phone}</a>`]);
  if(details.kashrut) rows.push(['✡️ כשרות',details.kashrut]);
  if(details.seats) rows.push(['👥 מקומות',details.seats]);
  if(details.access) rows.push(['♿ נגישות',details.access]);
  if(details.desc) rows.push(['תיאור',details.desc]);
  if(details.links&&details.links.length) rows.push(['קישורים',details.links.map(l=>`<a href="${l.url}" target="_blank">${l.label||l.url}</a>`).join(' ')]);
  if(details.customFields&&details.customFields.length){
    details.customFields.filter(f=>f.label&&f.value).forEach(f=>{
      const val=f.type==='link'?`<a href="${f.value}" target="_blank" style="display:inline-block;padding:4px 14px;background:#1a1a2e;color:white;border-radius:5px;text-decoration:none;font-size:0.8rem;font-weight:600;">קישור ↗</a>`:f.value;
      rows.push([f.label,val]);
    });
  }
  document.getElementById('hallModalFields').innerHTML=rows.map(([l,v])=>`<div class="hall-field-row"><span class="hall-field-label">${l}:</span><span class="hall-field-value">${v}</span></div>`).join('');

function renderCal(){
  if(!calYear){const n=new Date();calYear=n.getFullYear();calMonth=n.getMonth();}
  const first=new Date(calYear,calMonth,1),last=new Date(calYear,calMonth+1,0);
  const heM=first.toLocaleDateString('he-IL-u-ca-hebrew',{month:'long',year:'numeric'});
  document.getElementById('calTitle').textContent=MONTHS_GREG[calMonth]+' '+calYear+' | '+heM;
  const lk={};
  allData.filter(r=>r.hall===calHall&&r.dateObj>=first&&r.dateObj<=last).forEach(r=>{lk[r.dateKey]=r.status;});
  let html='';
  DAYS_S.forEach(d=>{html+=`<div class="cal-day-header">${d}</div>`;});
  for(let i=0;i<first.getDay();i++)html+=`<div class="cal-cell empty"></div>`;
  for(let day=1;day<=last.getDate();day++){
    const d=new Date(calYear,calMonth,day),key=fmtKey(d),s=lk[key]||null;
    const he=toHe(d),cls=sCls(s),txt=sTxt(s);
    const bg=cls==='cell-free'?'#d4f5e4':cls==='cell-taken'?'#fde8e8':'#fef3cd';
    const cl=cls==='cell-free'?'#1a7a45':cls==='cell-taken'?'#a32020':'#8a5c00';
    html+=`<div class="cal-cell"><div class="cal-date-he">${he}</div><div class="cal-date-greg">${day}/${calMonth+1}</div><span class="cal-status" style="background:${bg};color:${cl}">${txt}</span></div>`;
  }
  document.getElementById('calGrid').innerHTML=html;
}

function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCal();}
function calNext(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCal();}

function populateFilters(){
  const cities=[...new Set(allData.map(r=>r.city).filter(Boolean))].sort();
  const kash=[...new Set(allData.map(r=>r.kashrut).filter(Boolean))].sort();
  const savedOrder=safeParse(window._settings&&window._settings.hallOrder,null);
  const halls=[...new Set(allData.map(r=>r.hall))];
  if(savedOrder) halls.sort((a,b)=>{const ai=savedOrder.indexOf(a),bi=savedOrder.indexOf(b);return (ai===-1?999:ai)-(bi===-1?999:bi);});
  else halls.sort();

  buildCL('listCity','lblCity',cities);

function loadSettings(){
  const s=window._settings||{};
  if(s.siteName){
    document.getElementById('heroText').textContent=s.siteName;
  }
  if(s.headerColor)document.getElementById('siteHeader').style.background=s.headerColor;
  if(s.contactEmail){
    const cb=document.getElementById('contactBtnHeader');
    if(cb){cb.href='https://mail.google.com/mail/?view=cm&to='+encodeURIComponent(s.contactEmail);cb.target='_blank';cb.style.display='inline-flex';}
  }
  // Hero banner slideshow with slide transition
  let _slides=[];try{_slides=JSON.parse(s.logoSlides||'[]');}catch(e){}
  if(!_slides.length&&s.logo)_slides=[{url:s.logo,duration:5}];
  if(_slides.length){
    const banner=document.getElementById('heroBanner');
    // create two layers
    const mkLayer=()=>{const d=document.createElement('div');d.className='slide-layer';banner.prepend(d);return d;};
    const layA=mkLayer(),layB=mkLayer();
    // preload next image
    const preload=url=>{const i=new Image();i.src=url;};
    let _si=0,_active=layA,_next=layB;
    const ANIM=1100;
    const showSlide=()=>{
      const sl=_slides[_si%_slides.length];
      const nx=_slides[(_si+1)%_slides.length];
      _active.style.transition='none';
      _active.style.transform='translateX(0)';
      _active.style.backgroundImage=`url('${sl.url}')`;
      _next.style.transition='none';
      _next.style.transform='translateX(-100%)';
      preload(nx.url);
      _si++;
      // after duration, slide in next
      setTimeout(()=>{
        _next.style.backgroundImage=`url('${nx.url}')`;
        requestAnimationFrame(()=>requestAnimationFrame(()=>{
          _next.style.transition=`transform ${ANIM}ms cubic-bezier(0.77,0,0.18,1)`;
          _active.style.transition=`transform ${ANIM}ms cubic-bezier(0.77,0,0.18,1)`;
          _next.style.transform='translateX(0)';
          _active.style.transform='translateX(100%)';
          setTimeout(()=>{[_active,_next]=[_next,_active];showSlide();},ANIM);
        }));
      },(sl.duration||5)*1000);
    };
    showSlide();
  }
  if(s.heroSubtitle)document.getElementById('heroSubtext').textContent=s.heroSubtitle;
  const adBottom=document.getElementById('adBottom');
  if(adBottom){
    const showBottom=s.showAdBottom!=='false'&&s.showAdBottom!==false;
    const items=showBottom?safeParse(s.adItemsBottom,[]):[];
    if(showBottom&&items.length){
      adBottom.style.display='flex';
      document.body.classList.add('has-bottom-ad');
      if(!startAd('Bottom',items)) updateBottomAd(items[0]); // text-only fallback
    } else {
      adBottom.style.display='none';
      document.body.classList.remove('has-bottom-ad');
    }
  }
  const adSide=document.getElementById('adSidebar');
  if(adSide){
    const showSide=s.showAdSide!=='false'&&s.showAdSide!==false;
    if(showSide){
      adSide.style.display='flex';
      const items=safeParse(s.adItemsSide,[]);
      if(items.length&&!startAd('Side',items)) updateSideAd(items[0]); // text-only fallback
    } else adSide.style.display='none';
  }
}

const CACHE_KEY='hallCacheV2';

// The table only ever shows today→+365d. Drop rows outside a [-7d,+400d] window
// so we don't parse/cache ~24 years of data (152K rows / 8MB) to show one year.
function trimAvail(rows){
  if(!Array.isArray(rows)||!rows.length) return rows||[];
  const now=new Date();now.setHours(0,0,0,0);
  const loT=now.getTime()-7*864e5, hiT=now.getTime()+400*864e5;
  const dateKey=Object.keys(rows[0]).find(k=>k.toLowerCase().indexOf('date')>-1);
  if(!dateKey) return rows;
  const out=[];
  for(let i=0;i<rows.length;i++){
    const raw=(rows[i][dateKey]||'')+'';let t=NaN,p;
    if(raw.indexOf('/')>-1){p=raw.split('/');t=new Date(+p[2],+p[1]-1,+p[0]).getTime();}
    else if(raw.indexOf('T')>-1||raw.indexOf(':')>-1){t=Date.parse(raw);}
    else if(raw.indexOf('-')>-1){p=raw.split('-');t=new Date(+p[0],+p[1]-1,+p[2]).getTime();}
    if(isNaN(t)||(t>=loT&&t<=hiT)) out.push(rows[i]); // keep in-window or unparseable
  }
  return out;
}

// Process + render a complete data triplet. Returns true if data was usable.
function applyData(availData,settingsData,hallsData){
  settingsData=settingsData||{};hallsData=hallsData||[];
  window._settings=settingsData;
  window._hallDetails=hallsData;
  initDayToggles();
  allData=parseAPI(availData);
  if(!allData.length) return false;
  const map={};
  (hallsData||[]).forEach(d=>{map[d.name]={city:d.city||'',kashrut:d.kashrut||'',access:d.access||'',seats:parseInt(d.seats)||0};});
  allData.forEach(r=>{if(map[r.hall]){r.city=map[r.hall].city;r.kashrut=map[r.hall].kashrut;r.access=map[r.hall].access;r.seats=map[r.hall].seats;}});
  populateFilters();
  if(!document.getElementById('filterFrom').value){
    const t=new Date(),e=new Date();e.setDate(t.getDate()+365);
    document.getElementById('filterFrom').value=t.toISOString().split('T')[0];
    document.getElementById('filterTo').value=e.toISOString().split('T')[0];
  }
  document.getElementById('loading').style.display='none';
  buildTable();
  loadSettings();
  return true;
}

async function fetchData(){
  sessionStorage.removeItem('hd');sessionStorage.removeItem('ht');
  try{localStorage.removeItem('hallCacheV1');}catch(e){} // drop legacy oversized cache
  // 1) Instant render from cache (stale-while-revalidate)
  let renderedFromCache=false, cachedRaw=null;
  try{
    cachedRaw=localStorage.getItem(CACHE_KEY);
    if(cachedRaw){
      const c=JSON.parse(cachedRaw);
      renderedFromCache=applyData(c.avail,c.settings,c.halls);
    }
  }catch(e){}
  // 2) Refresh from network — in background if cache already rendered
  try{
    const _cb='_cb='+Date.now(); // cache-buster so the browser never serves a stale response
    const [r1,r2,r3]=await Promise.all([
      fetch(API_URL+'?'+_cb,{cache:'no-store'}),
      fetch(API_URL+'?action=settings&'+_cb,{cache:'no-store'}),
      fetch(API_URL+'?action=halls&'+_cb,{cache:'no-store'})
    ]);
    const availData=trimAvail(r1.ok?await r1.json():[]);
    const settingsData=r2.ok?await r2.json():{};
    const hallsData=r3.ok?await r3.json():[];
    const fresh=JSON.stringify({avail:availData,settings:settingsData,halls:hallsData});
    // Data unchanged since cache render → skip the expensive second render
    if(renderedFromCache&&cachedRaw===fresh) return;
    const ok=applyData(availData,settingsData,hallsData);
    if(ok){
      try{localStorage.setItem(CACHE_KEY,fresh);}catch(e){}
    } else if(!renderedFromCache){
      throw new Error('empty');
    }
  }catch(err){
    if(!renderedFromCache&&!allData.length){
      document.getElementById('loading').style.display='none';
      document.getElementById('errorMsg').style.display='block';
      document.getElementById('errorMsg').textContent='שגיאה בטעינת הנתונים.';
    }
  }
}
