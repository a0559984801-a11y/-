<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מידע על אולמות</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Assistant',sans-serif;background:#f7f5f0;min-height:100vh;}
header{background:#1a1a2e;color:white;padding:12px 20px;display:flex;align-items:center;gap:16px;}
.btn-back{padding:6px 14px;background:#e8b86d;color:#1a1a2e;border:none;border-radius:6px;cursor:pointer;font-family:'Assistant',sans-serif;font-weight:700;font-size:0.82rem;text-decoration:none;}
header h1{font-size:1.1rem;font-weight:700;}
.content{padding:20px;max-width:960px;margin:0 auto;}
.add-btn{padding:8px 16px;background:#1a1a2e;color:white;border:none;border-radius:6px;cursor:pointer;font-family:'Assistant',sans-serif;font-weight:600;font-size:0.85rem;margin-bottom:16px;}
.halls-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;}
.hall-card{background:white;border-radius:10px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,0.08);cursor:pointer;transition:box-shadow 0.2s;border:2px solid transparent;}
.hall-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.14);border-color:#1a1a2e;}
.hall-card h3{font-size:0.95rem;font-weight:700;color:#1a1a2e;margin-bottom:6px;}
.hall-card p{font-size:0.78rem;color:#888;}
.hall-card img{width:100%;height:100px;object-fit:cover;border-radius:6px;margin-bottom:8px;display:none;}

/* Expanded card overlay */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;align-items:center;justify-content:center;padding:16px;}
.overlay.open{display:flex;}
.expanded{background:white;border-radius:12px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;padding:20px;position:relative;}
.expanded h2{font-size:1.1rem;font-weight:700;color:#1a1a2e;margin-bottom:12px;}
.close-btn{position:absolute;top:12px;left:12px;background:#eee;border:none;border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;}
.expanded img{width:100%;max-height:200px;object-fit:cover;border-radius:8px;margin-bottom:12px;display:none;}
.expanded video{width:100%;max-height:200px;border-radius:8px;margin-bottom:12px;display:none;}
.expanded .links a{display:inline-block;margin:4px 4px 4px 0;padding:5px 12px;background:#f0f0f0;border-radius:20px;font-size:0.8rem;color:#1a1a2e;text-decoration:none;}
.expanded .links a:hover{background:#1a1a2e;color:white;}
.expanded p{font-size:0.88rem;color:#555;line-height:1.5;margin-bottom:10px;}
.edit-btn{padding:6px 14px;background:#1a1a2e;color:white;border:none;border-radius:6px;cursor:pointer;font-family:'Assistant',sans-serif;font-size:0.82rem;margin-top:8px;}

/* Edit modal */
.edit-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;align-items:center;justify-content:center;padding:16px;}
.edit-overlay.open{display:flex;}
.edit-modal{background:white;border-radius:12px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;padding:20px;}
.edit-modal h3{font-size:1rem;font-weight:700;color:#1a1a2e;margin-bottom:14px;}
.edit-modal label{font-size:0.78rem;color:#666;font-weight:600;display:block;margin-bottom:4px;margin-top:10px;}
.edit-modal input,.edit-modal textarea{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-family:'Assistant',sans-serif;font-size:0.88rem;}
.edit-modal textarea{resize:vertical;min-height:70px;}
.edit-modal .btns{display:flex;gap:8px;margin-top:14px;}
.btn-ok{flex:1;padding:9px;background:#1a1a2e;color:white;border:none;border-radius:6px;cursor:pointer;font-family:'Assistant',sans-serif;font-weight:600;}
.btn-cancel{padding:9px 14px;background:#eee;color:#444;border:none;border-radius:6px;cursor:pointer;font-family:'Assistant',sans-serif;}
.btn-del{padding:9px 14px;background:#fde8e8;color:#a32020;border:none;border-radius:6px;cursor:pointer;font-family:'Assistant',sans-serif;}
.upload-box{border:2px dashed #ddd;border-radius:8px;padding:14px;text-align:center;cursor:pointer;color:#999;font-size:0.82rem;margin-bottom:6px;}
.upload-box:hover{border-color:#1a1a2e;}
.links-list{display:flex;flex-direction:column;gap:6px;margin-bottom:6px;}
.link-row{display:flex;gap:6px;}
.link-row input{flex:1;}
.link-row button{padding:4px 10px;background:#fde8e8;color:#a32020;border:none;border-radius:5px;cursor:pointer;font-size:0.8rem;}
.add-link-btn{font-size:0.8rem;color:#1a1a2e;background:none;border:none;cursor:pointer;padding:0;}
</style>
</head>
<body>
<header>
  <a href="index.html" class="btn-back">← חזרה</a>
  <h1>מידע על אולמות חתונה</h1>
</header>
<div class="content">
  <p style="color:#888;font-size:0.85rem;margin-bottom:14px">לעריכת אולמות, היכנס ללוח הניהול</p>
  <div class="halls-grid" id="hallsGrid">
    <div style="text-align:center;padding:40px;color:#888;grid-column:1/-1;">טוען...</div>
  </div>
</div>

<!-- View overlay -->
<div class="overlay" id="viewOverlay" onclick="closeView(event)">
  <div class="expanded" id="expandedCard">
    <button class="close-btn" onclick="closeViewBtn()">✕</button>
    <img id="expImg"/>
    <video id="expVid" controls></video>
    <h2 id="expName"></h2>
    <p id="expDesc"></p>
    <div class="links" id="expLinks"></div>
    
  </div>
</div>

<!-- Edit modal -->
<div class="edit-overlay" id="editOverlay" onclick="closeEdit(event)">
  <div class="edit-modal" onclick="event.stopPropagation()">
    <h3 id="editTitle">עריכת אולם</h3>
    <input type="hidden" id="editId"/>
    <label>שם האולם</label>
    <input type="text" id="editName" placeholder="שם האולם"/>
    <label>תיאור קצר</label>
    <textarea id="editDesc" placeholder="תיאור, קיבולת, כשרות..."></textarea>
    <label>תמונה</label>
    <div class="upload-box" onclick="document.getElementById('editImgFile').click()">לחץ להעלאת תמונה</div>
    <input type="file" id="editImgFile" accept="image/*" style="display:none" onchange="handleImg(this)"/>
    <img id="editImgPreview" style="max-width:100%;max-height:100px;border-radius:6px;display:none;margin-bottom:6px;"/>
    <label>סרטון</label>
    <div class="upload-box" onclick="document.getElementById('editVidFile').click()">לחץ להעלאת סרטון</div>
    <input type="file" id="editVidFile" accept="video/*" style="display:none" onchange="handleVid(this)"/>
    <video id="editVidPreview" style="max-width:100%;max-height:80px;border-radius:6px;display:none;margin-bottom:6px;" controls></video>
    <label>קישורים</label>
    <div class="links-list" id="linksList"></div>
    <button class="add-link-btn" onclick="addLinkRow()">+ הוסף קישור</button>
    <div class="btns">
      <button class="btn-del" onclick="deleteHall()">מחק</button>
      <button class="btn-cancel" onclick="closeEditBtn()">ביטול</button>
      <button class="btn-ok" onclick="saveHall()">שמור</button>
    </div>
  </div>
</div>

<script>
const API_URL='https://script.google.com/macros/s/AKfycbziYMBlMR3C_QbmPmDESOkYBWPSGwJ4f2sja-Os4BKj7Xm5KLgdNkhEmY4w3_5Lq_RtnA/exec';

let halls = [], currentId = null;

async function loadHalls() {
  try {
    const cached=sessionStorage.getItem('alldata');
    if(cached){
      const bundle=JSON.parse(cached);
      halls=(bundle.halls||[]).filter(h=>h.name);
      renderGrid();
      return;
    }
    const res = await fetch(API_URL+'?action=halls');
    halls = (await res.json()).filter(h=>h.name);
    renderGrid();
  } catch(e) {
    document.getElementById('hallsGrid').innerHTML='<div style="text-align:center;padding:40px;color:#888;grid-column:1/-1">שגיאה בטעינה</div>';
  }
}

function renderGrid() {
  const grid = document.getElementById('hallsGrid');
  if (!halls.length) {
    grid.innerHTML = '<div style="text-align:center;padding:40px;color:#888;grid-column:1/-1">אין אולמות עדיין</div>';
    return;
  }
  grid.innerHTML = halls.map((h,i) => `
    <div class="hall-card" onclick="openView(${i})">
      ${h.img ? `<img src="${h.img}" style="display:block"/>` : ''}
      <h3>${h.name}</h3>
      <p>${h.desc ? h.desc.substring(0,60)+'...' : 'לחץ לפרטים'}</p>
    </div>
  `).join('');
}

function openView(i) {
  const h = halls[i];
  if (!h) return;
  currentId = i;
  document.getElementById('expName').textContent = h.name;
  const meta=[h.city&&('📍 '+h.city),h.kashrut&&('✡️ '+h.kashrut),h.access&&('♿ נגישות: '+h.access),h.seats&&('👥 '+h.seats+' מקומות')].filter(Boolean).join(' | ');
  document.getElementById('expDesc').innerHTML = (meta?'<div style="background:#f7f5f0;padding:8px 12px;border-radius:6px;margin-bottom:10px;font-size:0.82rem;font-weight:600">'+meta+'</div>':'') + (h.desc||'');
  const img = document.getElementById('expImg');
  if (h.img) { img.src=h.img; img.style.display='block'; } else img.style.display='none';
  const vid = document.getElementById('expVid');
  if (h.vid) { vid.src=h.vid; vid.style.display='block'; } else vid.style.display='none';
  const links = document.getElementById('expLinks');
  links.innerHTML = (h.links||[]).map(l=>`<a href="${l.url}" target="_blank">${l.label||l.url}</a>`).join('');
  document.getElementById('viewOverlay').classList.add('open');
}

function closeView(e) { if(e.target===document.getElementById('viewOverlay')) closeViewBtn(); }
function closeViewBtn() { document.getElementById('viewOverlay').classList.remove('open'); }

function openAdd() {
  currentId = null;
  document.getElementById('editTitle').textContent = 'הוספת אולם';
  document.getElementById('editId').value = '';
  document.getElementById('editName').value = '';
  document.getElementById('editDesc').value = '';
  document.getElementById('editImgPreview').style.display='none';
  document.getElementById('editVidPreview').style.display='none';
  document.getElementById('linksList').innerHTML='';
  editImgData = null; editVidData = null;
  document.getElementById('editOverlay').classList.add('open');
}

function openEdit() {
  const h = halls.find(x=>x.id===currentId);
  if (!h) return;
  closeViewBtn();
  document.getElementById('editTitle').textContent = 'עריכת ' + h.name;
  document.getElementById('editId').value = h.id;
  document.getElementById('editName').value = h.name;
  document.getElementById('editDesc').value = h.desc||'';
  editImgData = h.img||null;
  editVidData = h.vid||null;
  const imgP = document.getElementById('editImgPreview');
  if(h.img){imgP.src=h.img;imgP.style.display='block';}else imgP.style.display='none';
  const vidP = document.getElementById('editVidPreview');
  if(h.vid){vidP.src=h.vid;vidP.style.display='block';}else vidP.style.display='none';
  const ll = document.getElementById('linksList');
  ll.innerHTML='';
  (h.links||[]).forEach(l=>addLinkRow(l.label,l.url));
  document.getElementById('editOverlay').classList.add('open');
}

function closeEdit(e) { if(e.target===document.getElementById('editOverlay')) closeEditBtn(); }
function closeEditBtn() { document.getElementById('editOverlay').classList.remove('open'); }

function handleImg(input) {
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    editImgData=e.target.result;
    const p=document.getElementById('editImgPreview');
    p.src=editImgData; p.style.display='block';
  };
  reader.readAsDataURL(file);
}

function handleVid(input) {
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    editVidData=e.target.result;
    const p=document.getElementById('editVidPreview');
    p.src=editVidData; p.style.display='block';
  };
  reader.readAsDataURL(file);
}

function addLinkRow(label='',url='') {
  const ll=document.getElementById('linksList');
  const div=document.createElement('div');
  div.className='link-row';
  div.innerHTML=`<input type="text" placeholder="שם הקישור" value="${label}"/><input type="url" placeholder="https://..." value="${url}"/><button onclick="this.parentElement.remove()">✕</button>`;
  ll.appendChild(div);
}

async function saveHall() {
  const name=document.getElementById('editName').value.trim();
  if(!name){alert('חובה להכניס שם אולם');return;}
  const id=document.getElementById('editId').value||'hall_'+Date.now();
  const links=[...document.querySelectorAll('#linksList .link-row')].map(row=>{
    const inputs=row.querySelectorAll('input');
    return{label:inputs[0].value,url:inputs[1].value};
  }).filter(l=>l.url);
  const hall={id,name,desc:document.getElementById('editDesc').value,img:editImgData,vid:editVidData,links};
  await S.set('hall:'+id, JSON.stringify(hall));
  closeEditBtn();
  await loadHalls();
}

async function deleteHall() {
  if(!confirm('למחוק את האולם הזה?')) return;
  const id=document.getElementById('editId').value;
  await window.storage.delete('hall:'+id);
  closeEditBtn();
  await loadHalls();
}

loadHalls();
</script>
</body>
</html>
