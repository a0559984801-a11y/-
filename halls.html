<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מידע על אולמות</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Assistant',sans-serif;background:#f7f5f0;min-height:100vh;}
header{background:#1a1a2e;color:white;padding:12px 20px;display:flex;align-items:center;gap:16px;}
.btn-back{padding:6px 14px;background:#e8b86d;color:#1a1a2e;border:none;border-radius:6px;cursor:pointer;font-family:'Assistant',sans-serif;font-weight:700;font-size:0.82rem;text-decoration:none;}
header h1{font-size:1.1rem;font-weight:700;}
.content{padding:20px;max-width:960px;margin:0 auto;}
.halls-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;}
.hall-card{background:white;border-radius:10px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,0.08);cursor:pointer;transition:box-shadow 0.2s;border:2px solid transparent;}
.hall-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.14);border-color:#1a1a2e;}
.hall-card h3{font-size:0.95rem;font-weight:700;color:#1a1a2e;margin-bottom:6px;}
.hall-card p{font-size:0.78rem;color:#888;}
.hall-card img{width:100%;height:100px;object-fit:cover;border-radius:6px;margin-bottom:8px;}

/* Expanded overlay */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;align-items:center;justify-content:center;padding:16px;}
.overlay.open{display:flex;}
.expanded{background:white;border-radius:12px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;padding:20px;position:relative;}
.expanded h2{font-size:1.1rem;font-weight:700;color:#1a1a2e;margin-bottom:12px;}
.close-btn{position:absolute;top:12px;left:12px;background:#eee;border:none;border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;}
.expanded img{width:100%;max-height:200px;object-fit:cover;border-radius:8px;margin-bottom:12px;}
.expanded video{width:100%;max-height:200px;border-radius:8px;margin-bottom:12px;display:none;}
.expanded .links a{display:inline-block;margin:4px 4px 4px 0;padding:5px 12px;background:#f0f0f0;border-radius:20px;font-size:0.8rem;color:#1a1a2e;text-decoration:none;}
.expanded .links a:hover{background:#1a1a2e;color:white;}
.expanded p{font-size:0.88rem;color:#555;line-height:1.5;margin-bottom:10px;}
.meta-bar{background:#f7f5f0;padding:8px 12px;border-radius:6px;margin-bottom:10px;font-size:0.82rem;font-weight:600;color:#444;}
.empty-state{text-align:center;padding:40px;color:#888;grid-column:1/-1;}
</style>
</head>
<body>
<header>
  <a href="index.html" class="btn-back">← חזרה</a>
  <h1>מידע על אולמות חתונה</h1>
</header>
<div class="content">
  <p style="color:#888;font-size:0.85rem;margin-bottom:14px">לעריכת פרטי אולמות, היכנס ללוח הניהול</p>
  <div class="halls-grid" id="hallsGrid">
    <div class="empty-state">טוען...</div>
  </div>
</div>

<!-- View overlay -->
<div class="overlay" id="viewOverlay" onclick="closeView(event)">
  <div class="expanded" onclick="event.stopPropagation()">
    <button class="close-btn" onclick="document.getElementById('viewOverlay').classList.remove('open')">✕</button>
    <img id="expImg" style="display:none"/>
    <video id="expVid" controls style="display:none"></video>
    <h2 id="expName"></h2>
    <div class="meta-bar" id="expMeta" style="display:none"></div>
    <p id="expDesc"></p>
    <div class="links" id="expLinks"></div>
  </div>
</div>

<script>
const API_URL='https://script.google.com/macros/s/AKfycbziYMBlMR3C_QbmPmDESOkYBWPSGwJ4f2sja-Os4BKj7Xm5KLgdNkhEmY4w3_5Lq_RtnA/exec';
let halls=[];

async function loadHalls(){
  try{
    // Try session cache first (shared with index.html)
    const cached=sessionStorage.getItem('alldata');
    if(cached){
      const bundle=JSON.parse(cached);
      halls=(bundle.halls||[]).filter(h=>h.name);
      renderGrid();
      return;
    }
    const res=await fetch(API_URL+'?action=halls');
    halls=(await res.json()).filter(h=>h.name);
    renderGrid();
  }catch(e){
    document.getElementById('hallsGrid').innerHTML='<div class="empty-state">שגיאה בטעינה. נסה לרענן את הדף.</div>';
  }
}

function renderGrid(){
  const grid=document.getElementById('hallsGrid');
  if(!halls.length){
    grid.innerHTML='<div class="empty-state">אין פרטי אולמות עדיין.<br><small>הוסף אולמות דרך לוח הניהול</small></div>';
    return;
  }
  grid.innerHTML=halls.map((h,i)=>`
    <div class="hall-card" onclick="openView(${i})">
      ${h.img?`<img src="${h.img}" alt="${h.name}"/>`:''}
      <h3>${h.name}</h3>
      <p>${h.desc?h.desc.substring(0,60)+'...':'לחץ לפרטים נוספים'}</p>
      ${h.city?`<p style="margin-top:4px;font-size:0.72rem;color:#aaa">📍 ${h.city}</p>`:''}
    </div>
  `).join('');
}

function openView(i){
  const h=halls[i];
  if(!h) return;
  document.getElementById('expName').textContent=h.name;

  // Meta bar
  const metaParts=[
    h.city&&('📍 '+h.city),
    h.kashrut&&('✡️ '+h.kashrut),
    h.access&&('♿ נגישות: '+h.access),
    h.seats&&('👥 '+h.seats+' מקומות')
  ].filter(Boolean);
  const meta=document.getElementById('expMeta');
  if(metaParts.length){meta.textContent=metaParts.join(' | ');meta.style.display='block';}
  else meta.style.display='none';

  document.getElementById('expDesc').textContent=h.desc||'';

  const img=document.getElementById('expImg');
  if(h.img){img.src=h.img;img.style.display='block';}else img.style.display='none';

  const vid=document.getElementById('expVid');
  if(h.vid){vid.src=h.vid;vid.style.display='block';}else vid.style.display='none';

  const links=document.getElementById('expLinks');
  links.innerHTML=(h.links||[]).map(l=>`<a href="${l.url}" target="_blank">${l.label||l.url}</a>`).join('');

  document.getElementById('viewOverlay').classList.add('open');
}

function closeView(e){if(e.target===document.getElementById('viewOverlay'))document.getElementById('viewOverlay').classList.remove('open');}

loadHalls();
</script>
</body>
</html>
